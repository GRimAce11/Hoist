name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-flight runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Fast feedback: build + run the unit-test suite via SwiftPM on macOS.
  swift-test:
    name: Swift test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

  # 2. Platform validation: confirm the package compiles for every supported
  #    Apple platform. Uses generic simulator destinations so the matrix runs
  #    in seconds without spinning up real simulators.
  build-platforms:
    name: Build (${{ matrix.platform }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: generic/platform=iOS Simulator
          - platform: tvOS
            destination: generic/platform=tvOS Simulator
          - platform: watchOS
            destination: generic/platform=watchOS Simulator
          - platform: visionOS
            destination: generic/platform=visionOS Simulator
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Build for ${{ matrix.platform }}
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme Hoist \
            -destination '${{ matrix.destination }}' \
            -configuration Debug \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=""
